<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peserta Event - NongkrongFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 py-10">

    <div class="max-w-4xl mx-auto px-4">
        <div class="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden">
            
            <!-- HEADER DAFTAR -->
            <div class="p-6 md:p-8 bg-gray-900 text-white flex items-center justify-between">
                <div class="space-y-1">
                    <span class="text-xs font-bold text-amber-400 uppercase tracking-widest">Daftar Manifest</span>
                    <h1 class="text-xl md:text-2xl font-bold" th:text="${event != null ? event.nama_event : 'Tidak ada event'}">Nama Event</h1>
                </div>
                <a href="/event" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl text-xs font-semibold border border-white/10 transition-colors">
                    ← Kembali
                </a>
            </div>

            <!-- TABEL PESERTA -->
            <div class="overflow-x-auto">
                <table class="w-full border-collapse text-left text-sm text-gray-500">
                    <thead class="bg-gray-50 text-xs font-bold uppercase tracking-wider text-gray-400 border-b border-gray-100">
                        <tr>
                            <th scope="col" class="px-6 py-4">ID Peserta</th>
                            <th scope="col" class="px-6 py-4">Nama User</th>
                            <th scope="col" class="px-6 py-4">Email</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 border-t border-gray-100">
                        <!-- Loop Peserta -->
                        <tr th:each="peserta : ${pesertaList}" class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 font-semibold text-gray-900" th:text="${peserta.id_peserta}"></td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 bg-amber-500 text-white rounded-full flex items-center justify-center font-bold text-xs" th:text="${#strings.substring(peserta.user != null ? peserta.user.nama : 'U',0,1)}"></div>
                                    <span class="font-medium text-gray-800" th:text="${peserta.user != null ? peserta.user.nama : '-'}">Nama</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-gray-600" th:text="${peserta.user != null ? peserta.user.email : '-'}">Email</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</body>
</html>
