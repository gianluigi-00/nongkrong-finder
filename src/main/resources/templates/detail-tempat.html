<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Tempat - NongkrongFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link class="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- NAVBAR -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 text-white p-2.5 rounded-xl shadow-lg shadow-amber-500/20">
                    <i class="fa-solid fa-mug-hot text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-gray-900">Nongkrong<span class="text-amber-500">Finder</span></span>
            </div>
            <div class="hidden md:flex items-center gap-8 font-medium text-gray-600">
                <a href="/dashboard" class="hover:text-amber-500 transition-colors">Dashboard</a>
                <a href="/tempat" class="text-amber-500 transition-colors">Tempat</a>
                <a href="/favorit" class="hover:text-amber-500 transition-colors">Favorit</a>
                <a href="/event" class="hover:text-amber-500 transition-colors">Event</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="/logout" class="bg-gray-900 text-white px-5 py-2.5 rounded-xl font-semibold hover:bg-gray-800 transition-all text-sm">Logout</a>
            </div>
        </div>
    </nav>

    <!-- CONTENT BODY -->
    <main class="max-w-4xl mx-auto px-4 py-10">
        <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-xl space-y-6">
            
            <!-- Banner Foto Besar -->
            <div class="relative h-72 md:h-96 bg-gray-900">
                <img th:src="${tempat.foto != null && !tempat.foto.isEmpty() ? tempat.foto : 'https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=1000'}" alt="Banner" class="w-full h-full object-cover opacity-80">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                <div class="absolute bottom-6 left-6 right-6 text-white space-y-2">
                    <span class="inline-block bg-amber-500 text-white px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-wider" th:text="${tempat.kategori}">Kategori</span>
                    <h1 class="text-2xl md:text-4xl font-extrabold" th:text="${tempat.nama_tempat}">Nama Tempat</h1>
                    <p class="text-sm text-gray-200 flex items-center gap-1.5"><i class="fa-solid fa-location-dot text-amber-500"></i> <span th:text="${tempat.alamat}">Alamat Lengkap</span></p>
                </div>
            </div>

            <!-- Detail Informasi Grid -->
            <div class="p-6 md:p-8 space-y-6">
                <!-- Deskripsi -->
                <div class="space-y-2">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400">Tentang Tempat</h3>
                    <p class="text-gray-600 leading-relaxed text-sm md:text-base" th:text="${tempat.deskripsi}">Deskripsi lengkap mengenai tempat ini.</p>
                </div>

                <!-- Jam Buka & Rating Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-gray-100">
                    <div class="bg-gray-50 p-4 rounded-2xl flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-clock"></i></div>
                        <div>
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Jam Operasional</h4>
                            <p class="font-bold text-gray-800 text-sm mt-0.5" th:text="${tempat.jam_buka} + ' - ' + ${tempat.jam_tutup}">09:00 - 22:00</p>
                        </div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl flex items-center gap-4">
                        <div class="w-10 h-10 bg-amber-50 text-amber-500 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-star"></i></div>
                        <div>
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Rating Rata-Rata</h4>
                            <p class="font-bold text-gray-800 text-sm mt-0.5">⭐⭐⭐⭐⭐ <span class="text-xs text-gray-400 font-medium">(5.0)</span></p>
                        </div>
                    </div>
                </div>

                <!-- Tombol Navigasi Aksi -->
                <div class="pt-6 border-t border-gray-100 flex flex-wrap gap-3">
                    <a th:href="@{/review/{id}(id=${tempat.id_tempat})}" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-amber-500/20 flex items-center gap-2">
                        <i class="fa-solid fa-comments"></i> Lihat & Tulis Review
                    </a>
                    <a th:href="@{/favorit/tambah/{id}(id=${tempat.id_tempat})}" class="bg-red-50 hover:bg-red-100 text-red-600 px-6 py-3 rounded-xl font-bold text-sm transition-all flex items-center gap-2">
                        <i class="fa-solid fa-heart"></i> Tambah Favorit
                    </a>
                    <a href="/tempat" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-6 py-3 rounded-xl font-bold text-sm transition-all ml-auto">
                        ← Kembali
                    </a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
